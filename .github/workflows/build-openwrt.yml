name: Build FW28-V21 AutoAPN 4G (Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev git python3 unzip wget gawk flex bison libssl-dev zlib1g-dev libelf-dev subversion libncursesw5-dev libreadline-dev libtool automake autoconf pkg-config ccache

      - name: 拉取 ImmortalWrt 源码
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: openwrt-23.05
          fetch-depth: 1

      - name: 创建 FW28-V21 设备树 (精简版)
        run: |
          cat > target/linux/ramips/dts/mt7628an_fw28-v21.dts <<'EOF'
          // SPDX-License-Identifier: GPL-2.0-or-later
          /dts-v1/;
          #include "mt7628an.dtsi"
          #include <dt-bindings/gpio/gpio.h>
          #include <dt-bindings/input/input.h>
          / {
          	compatible = "fw28,v21", "mediatek,mt7628an-soc";
          	model = "FW28-V21";
          	chosen { bootargs = "console=ttyS0,57600"; };
          	memory@0 { device_type = "memory"; reg = <0x0 0x4000000>; };
          	keys {
          		compatible = "gpio-keys";
          		reset { label = "reset"; gpios = <&gpio 38 GPIO_ACTIVE_LOW>; linux,code = <KEY_RESTART>; };
          	};
          };
          &ethernet { nvmem-cells = <&macaddr_factory_4>; nvmem-cell-names = "mac-address"; };
          &esw { mediatek,portmap = <0x2f>; };
          &wmac { status = "okay"; mediatek,mtd-eeprom = <&factory 0x0>; };
          &pcie { status = "okay"; };
          &pcie0 { wifi@0,0 { compatible = "mediatek,mt76"; reg = <0x0000 0 0 0 0>; }; };
          &spi0 {
          	status = "okay";
          	flash@0 {
          		compatible = "jedec,spi-nor"; reg = <0>; spi-max-frequency = <40000000>;
          		partitions {
          			compatible = "fixed-partitions"; #address-cells = <1>; #size-cells = <1>;
          			partition@0 { label = "u-boot"; reg = <0x0 0x30000>; read-only; };
          			partition@30000 { label = "u-boot-env"; reg = <0x30000 0x10000>; read-only; };
          			partition@40000 {
          				label = "factory"; reg = <0x40000 0x10000>; read-only;
          				compatible = "nvmem-cells"; #address-cells = <1>; #size-cells = <1>;
          				eeprom_factory_0: eeprom@0 { reg = <0x0 0x400>; };
          				macaddr_factory_4: macaddr@4 { reg = <0x4 0x6>; };
          			};
          			partition@50000 { label = "firmware"; reg = <0x50000 0xfb0000>; compatible = "denx,uimage"; };
          		};
          	};
          };
          &uart1 { status = "okay"; };
          EOF

      - name: 添加设备到 mt76x8.mk
        run: |
          cat >> target/linux/ramips/image/mt76x8.mk <<'EOF'
          define Device/fw28-v21
            IMAGE_SIZE := 16000k
            DEVICE_VENDOR := FW28
            DEVICE_MODEL := V21
            DEVICE_PACKAGES := kmod-usb2 kmod-usb-ohci kmod-usb-serial-option kmod-usb-net-qmi-wwan modemmanager luci-proto-modemmanager usb-modeswitch
            SUPPORTED_DEVICES += fw28,v21
          endef
          TARGET_DEVICES += fw28-v21
          EOF

      - name: 创建内置配置 (自动APN + 预置网络)
        run: |
          mkdir -p files/etc/hotplug.d/iface files/etc/config
          cat > files/etc/hotplug.d/iface/99-auto-apn <<'EOF'
          #!/bin/sh
          [ "$ACTION" = "ifup" ] && [ "$INTERFACE" = "4g" ] || exit 0
          logger -t "auto-apn" "4G up, detecting APN..."
          sleep 5
          MODEM_NUM=$(mmcli -L 2>/dev/null | grep -oE '[0-9]+' | head -1)
          [ -z "$MODEM_NUM" ] && exit 1
          IMSI=$(mmcli -m "$MODEM_NUM" --3gpp-get-imei 2>/dev/null | grep -oE "imsi: '[0-9]+'" | cut -d"'" -f2)
          [ -z "$IMSI" ] && exit 1
          MCCMNC=$(echo "$IMSI" | cut -c1-5)
          case "$MCCMNC" in
              46000|46002|46004|46007|46008) APN="cmnet" ;;
              46001|46006|46009)             APN="3gnet" ;;
              46003|46005|46011)             APN="ctnet" ;;
              *)                             APN="" ;;
          esac
          if [ -n "$APN" ] && [ "$(uci -q get network.4g.apn)" != "$APN" ]; then
              logger -t "auto-apn" "Set APN to $APN"
              uci set network.4g.apn="$APN"
              uci commit network
              /etc/init.d/network reload
          fi
          EOF
          chmod +x files/etc/hotplug.d/iface/99-auto-apn
          cat > files/etc/config/network <<'EOF'
          config interface 'loopback'
          	option device 'lo'
          	option proto 'static'
          	option ipaddr '127.0.0.1'
          	option netmask '255.0.0.0'
          config globals 'globals'
          	option ula_prefix 'fd00::/48'
          config device
          	option name 'br-lan'
          	option type 'bridge'
          	list ports 'eth0.1'
          config interface 'lan'
          	option device 'br-lan'
          	option proto 'static'
          	option ipaddr '192.168.1.1'
          	option netmask '255.255.255.0'
          config interface '4g'
          	option proto 'modemmanager'
          	option device '/sys/class/net/wwan0'
          	option apn ''
          	option autoconnect '1'
          EOF

      - name: 写入精简编译配置
        run: |
          cat > .config <<'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt76x8=y
          CONFIG_TARGET_ramips_mt76x8_DEVICE_fw28-v21=y
          CONFIG_TARGET_OPTIMIZATION="-Os -pipe"
          CONFIG_SMALL_FLASH=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_KERNEL_PARTSIZE=2048
          CONFIG_TARGET_ROOTFS_PARTSIZE=9728
          CONFIG_PACKAGE_kmod-mt76x8=y
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb-ohci=y
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_kmod-usb-serial-option=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
          CONFIG_PACKAGE_usb-modeswitch=y
          CONFIG_PACKAGE_modemmanager=y
          CONFIG_PACKAGE_luci-proto-modemmanager=y
          CONFIG_PACKAGE_dnsmasq=y
          CONFIG_PACKAGE_firewall=y
          CONFIG_PACKAGE_wpad-basic-mbedtls=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_dropbear=y
          # CONFIG_IPV6 is not set
          EOF

      - name: 生成完整配置
        run: make defconfig

      - name: 更新并安装 feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 下载所有依赖包 (带重试)
        run: |
          for i in 1 2 3; do
              make download -j$(nproc) && break || sleep 10
          done

      - name: 开始编译固件
        run: make -j$(nproc) V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: FW28-V21-AutoAPN-Stable
          path: bin/targets/ramips/mt76x8/*sysupgrade.bin
          if-no-files-found: error
